version: "3.9"

services:
  # ── Qdrant vector database ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rag_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data          # mounted so you can drop docs in
      - ./qdrant_storage:/app/qdrant_storage
    depends_on:
      qdrant:
        condition: service_healthy

  # ── Streamlit frontend ────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: rag_ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api

volumes:
  qdrant_storage:
