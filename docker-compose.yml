version: "3.9"

services:
  # ── Qdrant vector database ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (job queue for ARQ workers) ─────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes   # persist jobs across restarts
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI backend (API + webhook receiver) ──────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rag_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
      - ./qdrant_storage:/app/qdrant_storage
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── ARQ ingestion worker ──────────────────────────────────────
  # Runs the async job queue — picks up webhook-triggered ingestion
  # jobs from Redis and processes them independently of the API server.
  # Scale horizontally by adding more replicas:
  #   docker compose up --scale worker=4
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rag_worker
    restart: unless-stopped
    command: python -m workers.ingestion_worker
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
      - ./qdrant_storage:/app/qdrant_storage
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Streamlit frontend ────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: rag_ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api

volumes:
  qdrant_storage:
  redis_data:
